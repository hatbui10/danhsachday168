<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dịch Chuyển Số n1-n2</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #151515;
            --accent: #00ff88;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px-35px rgba(0,0,0,0.5);
        }

        .input-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .box {
            flex: 1;
            text-align: center;
        }

        .label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        input[type="tel"] {
            width: 100%;
            background: #000;
            border: 2px solid #333;
            color: var(--accent);
            font-size: 2.2rem;
            height: 65px;
            text-align: center;
            border-radius: 12px;
            outline: none;
            font-weight: bold;
        }

        #n2 { border-color: var(--accent); }
        #copyResult { color: #ff3d00; border-color: #444; } /* Ô kết quả cuối cùng */

        .results-panel {
            background: #000;
            height: 350px;
            border-radius: 12px;
            overflow-y: auto;
            border: 1px solid #222;
        }

        .result-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #111;
            font-family: monospace;
            font-size: 1.3rem;
        }

        .mm { color: #777; }
        .ab { color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--accent); }
        .xxx { color: #eee; }

        .file-section {
            margin-bottom: 15px;
            text-align: center;
        }

        .btn-file {
            padding: 8px 15px;
            background: #222;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="file-section">
        <label class="btn-file">
            📁 NẠP FILE DỮ LIỆU (.TXT)
            <input type="file" id="fileInput" accept=".txt" style="display:none">
        </label>
        <div id="status" style="font-size: 11px; color: #555; margin-top: 5px;">Chưa có dữ liệu</div>
    </div>

    <div class="input-flow">
        <div class="box">
            <div class="label">Tìm (Copy)</div>
            <input type="tel" id="copyResult" readonly placeholder="--">
        </div>
        <div style="color: #444">←</div>
        <div class="box">
            <div class="label">Chờ (n1)</div>
            <input type="tel" id="n1" readonly placeholder="-">
        </div>
        <div style="color: #444">←</div>
        <div class="box">
            <div class="label">Nhập (n2)</div>
            <input type="tel" id="n2" maxlength="1" placeholder="0" autofocus>
        </div>
    </div>

    <div class="results-panel" id="display">
        <div style="text-align:center; color:#444; margin-top:100px;">Nhập số để tìm kiếm...</div>
    </div>
</div>

<script>
    const n2 = document.getElementById('n2');
    const n1 = document.getElementById('n1');
    const copyResult = document.getElementById('copyResult');
    const display = document.getElementById('display');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');

    // Nạp dữ liệu
    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        localStorage.setItem('data', text.replace(/\s+/g, ''));
        status.innerText = "Đã nạp: " + file.name;
        n2.focus();
    };

    // Xử lý dịch chuyển trái
    n2.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        if (val === '') return;

        // Quy trình dịch chuyển:
        // 1. Số ở n1 cũ kết hợp với số n2 mới tạo thành bộ 2 số (Số cần tìm)
        // 2. n1 cũ đẩy sang vị trí hàng chục, n2 mới vào vị trí hàng đơn vị
        
        let soTruoc = n1.value; // Lấy số đang đợi ở n1
        let soMoi = val;        // Lấy số vừa gõ ở n2
        
        if (soTruoc !== "") {
            let capSo = soTruoc + soMoi; // Ghép thành 2 số
            copyResult.value = capSo;    // Đẩy sang ô Copy/Tìm kiếm
            performSearch(capSo);        // Chạy tìm kiếm ngay
        }

        // Cập nhật n1 bằng số n2 vừa nhập để đợi lần gõ sau
        n1.value = soMoi;
        
        // Xóa n2 để nhập tiếp
        n2.value = '';
    });

    function performSearch(target) {
        const data = localStorage.getItem('data');
        if (!data) { alert("Chưa có file!"); return; }

        display.innerHTML = '';
        let results = [];

        for (let i = 0; i <= data.length - 10; i += 10) {
            const chunk = data.substring(i, i + 10);
            if (chunk.includes(target)) {
                const pos = chunk.indexOf(target);
                const gIdx = i + pos;
                const mm = data.substring(gIdx - 2, gIdx);
                const xxx = data.substring(gIdx + 2, gIdx + 8);
                if (mm.length === 2) {
                    results.push({ mm, ab: target, xxx: xxx.padEnd(6, '-') });
                }
            }
        }

        const sorted = results.sort((a, b) => parseInt(a.mm) - parseInt(b.mm));
        
        if (sorted.length === 0) {
            display.innerHTML = `<div style="padding:20px; color:#555; text-align:center">Không thấy số ${target}</div>`;
        } else {
            sorted.forEach(item => {
                const row = document.createElement('div');
                row.className = 'result-row';
                row.innerHTML = `<span class="mm">${item.mm}</span><span>-</span><span class="ab">${item.ab}</span><span>-</span><span class="xxx">${item.xxx}</span>`;
                display.appendChild(row);
            });
        }
    }
</script>

</body>
</html>
