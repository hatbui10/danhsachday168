<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm khối số - Lưu trữ</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            font-family: 'Segoe UI', sans-serif; background: #0d0f13; color: #fff;
            overflow-x: hidden;
        }
        .container {
            width: 95%; max-width: 500px; margin-top: 20px; margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: stretch;
        }
        .file-upload {
            background: #1c1f26; padding: 15px; border-radius: 10px;
            border: 1px dashed #444; margin-bottom: 20px; text-align: center;
        }
        input[type="file"] { font-size: 0.8rem; color: #888; width: 100%; }
        #numInput {
            width: 100%; height: 100px; font-size: 4.5rem; font-weight: bold;
            text-align: center; border: 3px solid #00d2ff; border-radius: 20px;
            background: #000; color: #00d2ff; outline: none; margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2); transition: 0.2s;
        }
        #numInput:focus { transform: scale(1.02); }
        #resultArea {
            background: #1c1f26; border-radius: 12px; padding: 5px 15px;
            display: none; border: 1px solid #333; max-height: 350px;
            overflow-y: auto; margin-bottom: 15px;
        }
        .result-item {
            padding: 12px 0; border-bottom: 1px solid #2d323a;
            font-family: 'Consolas', monospace; font-size: 1.2rem; text-align: center;
        }
        .result-item:last-child { border-bottom: none; }
        .highlight { color: #ff4757; font-weight: bold; margin-right: 5px; }
        .status-bar { 
            background: #252a33; padding: 12px; border-radius: 8px;
            font-size: 0.9rem; color: #00ff88; text-align: center;
        }
        /* Nút xóa dữ liệu để làm sạch bộ nhớ */
        .btn-clear {
            margin-top: 10px; background: transparent; border: none;
            color: #555; cursor: pointer; font-size: 0.75rem; text-decoration: underline;
        }
        .btn-clear:hover { color: #ff4757; }
    </style>
</head>
<body>

<div class="container">
    <div class="file-upload">
        <div style="margin-bottom: 10px; font-size: 0.85rem; color: #aaa;">Tải tệp .txt (Lưu tự động):</div>
        <input type="file" id="fileInput" accept=".txt">
        <button class="btn-clear" onclick="clearData()">Xóa dữ liệu đã lưu</button>
    </div>

    <input type="text" id="numInput" maxlength="2" placeholder="--" inputmode="numeric" autofocus autocomplete="off">
    
    <div id="resultArea"></div>

    <div class="status-bar" id="statusMsg">Khởi động...</div>
</div>

<script>
    let allLines = [];
    const STORAGE_KEY = 'my_txt_data_v2'; // Key lưu trữ

    const fileInput = document.getElementById('fileInput');
    const numInput = document.getElementById('numInput');
    const resultArea = document.getElementById('resultArea');
    const statusMsg = document.getElementById('statusMsg');

    // 1. TỰ ĐỘNG NẠP DỮ LIỆU KHI MỞ TRANG
    window.onload = function() {
        try {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                allLines = JSON.parse(savedData);
                statusMsg.innerText = `Sẵn sàng! Đã nạp ${allLines.length} dòng từ bộ nhớ.`;
                statusMsg.style.color = "#00ff88";
            } else {
                statusMsg.innerText = "Chưa có dữ liệu. Hãy tải file lần đầu!";
                statusMsg.style.color = "#ff4757";
            }
        } catch (e) {
            console.error("Lỗi nạp dữ liệu:", e);
            statusMsg.innerText = "Lỗi bộ nhớ. Hãy tải lại file!";
        }
        numInput.focus();
    };

    // 2. LƯU DỮ LIỆU KHI CHỌN FILE MỚI
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        statusMsg.innerText = "Đang nạp dữ liệu...";
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            // Tách dòng và lọc bỏ dòng trống
            allLines = content.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
            
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allLines));
                statusMsg.innerText = `Thành công! Đã lưu ${allLines.length} dòng.`;
                statusMsg.style.color = "#00ff88";
            } catch (err) {
                statusMsg.innerText = "Lỗi: File quá lớn so với bộ nhớ trình duyệt!";
                statusMsg.style.color = "#ff4757";
            }
            numInput.focus();
        };
        reader.readAsText(file);
    });

    // 3. XÓA DỮ LIỆU KHI CẦN
    function clearData() {
        if(confirm("Bạn có muốn xóa dữ liệu đã lưu trong máy?")) {
            localStorage.removeItem(STORAGE_KEY);
            allLines = [];
            statusMsg.innerText = "Đã xóa sạch bộ nhớ.";
            statusMsg.style.color = "#ff4757";
            fileInput.value = "";
        }
    }

    // 4. XỬ LÝ TÌM KIẾM (Giữ nguyên logic của bạn)
    numInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
        const searchVal = this.value;

        if (searchVal.length === 2) {
            if (allLines.length === 0) {
                statusMsg.innerText = "Lỗi: Chưa có dữ liệu!";
                this.value = "";
                return;
            }

            const matches = allLines.filter(line => line.startsWith(searchVal));

            if (matches.length > 0) {
                resultArea.innerHTML = "";
                resultArea.style.display = "block";

                matches.forEach(line => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    const prefix = line.substring(0, 2);
                    const rest = line.substring(2);
                    div.innerHTML = `<span class="highlight">${prefix}</span>${rest}`;
                    resultArea.appendChild(div);
                });

                // Copy tự động (ví dụ: 56x)
                const copyText = searchVal + "x";
                navigator.clipboard.writeText(copyText).then(() => {
                    statusMsg.innerHTML = `Tìm thấy ${matches.length} dòng. <b>Đã Copy: ${copyText}</b>`;
                });

            } else {
                resultArea.style.display = "none";
                statusMsg.innerText = "Không thấy khối: " + searchVal;
            }

            setTimeout(() => {
                this.value = "";
                this.focus();
            }, 800);
        }
    });

    // Luôn focus
    document.addEventListener('click', (e) => {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') numInput.focus();
    });
</script>

</body>
</html>
