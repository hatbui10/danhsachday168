<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Lọc Dãy Số MM-Ab-XXXXXX</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #00e676;
            --text: #efefef;
            --border: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        .section {
            border: 1px solid var(--border);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .label {
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Nút Upload */
        input[type="file"] { display: none; }
        .upload-btn {
            display: inline-block;
            background: #222;
            padding: 10px 20px;
            border: 1px solid #444;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-btn:hover { border-color: var(--accent); background: #2a2a2a; }

        /* Ô nhập số */
        #abInput {
            background: #000;
            border: 2px solid var(--border);
            color: var(--accent);
            font-size: 3rem;
            width: 130px;
            text-align: center;
            border-radius: 10px;
            outline: none;
            display: block;
            margin: 0 auto;
        }
        #abInput:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,230,118,0.2); }

        /* Danh sách kết quả */
        #result-list {
            margin-top: 10px;
            max-height: 500px;
            overflow-y: auto;
            border-top: 1px solid var(--border);
        }

        .row {
            padding: 12px;
            margin: 8px 0;
            background: #222;
            border-radius: 6px;
            font-size: 1.3rem;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .mm { color: #888; font-weight: bold; }
        .ab { color: var(--accent); font-weight: bold; text-decoration: underline; }
        .xxx { color: #fff; letter-spacing: 2px; }
        .sep { color: #444; }

        .info { font-size: 0.8rem; color: #555; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <div class="label">Bước 1: Tải file & Lưu dữ liệu</div>
        <label class="upload-btn">
            Chọn file dữ liệu (.txt)
            <input type="file" id="fileInput" accept=".txt">
        </label>
        <div id="fileStatus" class="info">Chưa có dữ liệu trong LocalStorage.</div>
    </div>

    <div class="section">
        <div class="label">Bước 2 & 3: Nhập 2 số (Ab)</div>
        <input type="text" id="abInput" maxlength="2" placeholder="--" autocomplete="off">
        <div class="info">Nhập đủ 2 số để tự động hiện kết quả</div>
    </div>

    <div id="result-list"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const abInput = document.getElementById('abInput');
    const resultList = document.getElementById('result-list');
    const fileStatus = document.getElementById('fileStatus');

    // Khởi tạo trang
    window.onload = () => {
        const savedData = localStorage.getItem('fileContent');
        if (savedData) {
            fileStatus.innerText = "Dữ liệu đã sẵn sàng. Bạn có thể nhập số.";
        }
        abInput.focus(); // Tự động focus ô nhập
    };

    // BƯỚC 1: Tải file và lưu LocalStorage
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const text = await file.text();
        // Nối tất cả thành 1 chuỗi số liên tục (xóa khoảng trắng, xuống dòng)
        const cleanData = text.replace(/\s+/g, '');
        
        localStorage.setItem('fileContent', cleanData);
        fileStatus.innerText = `Đã lưu file: ${file.name}`;
        
        abInput.focus();
        if (abInput.value.length === 2) performSearch(abInput.value);
    });

    // BƯỚC 2 & 3: Nhập và tự động hiện kết quả
    abInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, ''); // Chỉ cho phép nhập số
        e.target.value = val;

        if (val.length === 2) {
            performSearch(val);
        } else {
            resultList.innerHTML = '';
        }
    });

    function performSearch(targetAb) {
        const data = localStorage.getItem('fileContent');
        if (!data) {
            alert("Vui lòng tải file ở Bước 1 trước!");
            return;
        }

        resultList.innerHTML = '';
        let found = false;

        // Quét dữ liệu theo phương pháp xét 10 số 1 lần (i += 10)
        for (let i = 0; i <= data.length - 10; i += 10) {
            const chunk = data.substring(i, i + 10);
            
            // Nếu cụm 10 số có chứa số Ab
            if (chunk.includes(targetAb)) {
                found = true;
                
                // Xác định vị trí chính xác của Ab trong chuỗi tổng thể
                const abPosInChunk = chunk.indexOf(targetAb);
                const globalAbIndex = i + abPosInChunk;

                // MM: 2 số phía trước Ab
                const mm = data.substring(globalAbIndex - 2, globalAbIndex);
                
                // xxxxxx: 6 số phía sau Ab
                const xxx = data.substring(globalAbIndex + 2, globalAbIndex + 8);

                // Chỉ hiển thị nếu có đủ 2 số phía trước (tránh trường hợp Ab nằm ở đầu file)
                if (mm.length === 2) {
                    renderRow(mm, targetAb, xxx.padEnd(6, '-'));
                }
            }
        }

        if (!found) {
            resultList.innerHTML = `<div style="text-align:center; color:#444; padding:20px;">Không tìm thấy dãy nào phù hợp.</div>`;
        }
    }

    function renderRow(mm, ab, xxx) {
        const div = document.createElement('div');
        div.className = 'row';
        
        // Định dạng: MM- Ab -xxxxxx
        div.innerHTML = `
            <span class="mm">${mm}</span>
            <span class="sep">-</span>
            <span class="ab">${ab}</span>
            <span class="sep">-</span>
            <span class="xxx">${xxx}</span>
        `;
        resultList.appendChild(div);
    }
</script>

</body>
</html>
