
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ABC Logic</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-content:flex-start;
margin-top:80px;
color:white;
}

.panel{background:#1e293b;padding:25px;border-radius:12px}

.row{display:flex;gap:15px}

.box{display:flex;flex-direction:column;align-items:center}

label{margin-bottom:6px;font-weight:bold}

input{
width:70px;height:70px;font-size:26px;text-align:center;
border:none;border-radius:8px
}

.result{
margin-top:25px;font-size:40px;font-weight:bold;text-align:center;color:#22c55e
}
</style>
</head>

<body>

<div class="panel">

<div class="row">
<div class="box"><label>A</label><input id="A" readonly></div>
<div class="box"><label>B</label><input id="B" readonly></div>
<div class="box"><label>C</label><input id="C" readonly></div>
<div class="box">
<label>D</label>
<input id="D" type="tel" inputmode="numeric" pattern="[0-9]*">
</div>
</div>

<div id="result" class="result">WAIT</div>

</div>

<script>

const A=document.getElementById("A")
const B=document.getElementById("B")
const C=document.getElementById("C")
const D=document.getElementById("D")
const result=document.getElementById("result")

window.onload=()=>D.focus()

D.addEventListener("input",()=>{

let v=parseInt(D.value)
if(isNaN(v)) return

A.value=B.value
B.value=C.value
C.value=v

D.value=""
D.focus()

let a=parseInt(A.value)
let b=parseInt(B.value)
let c=parseInt(C.value)

if(!isNaN(a)&&!isNaN(b)&&!isNaN(c)){
result.textContent=logic(a,b,c)
}

})

function logic(a,b,c){

switch(c){
////////////////////////////////////////////////////////////////
case 0:

// gặp 000
if(a==0 && b==0 && c==0) return 0

// trước 0 có 2 số <5
if(a<5 && b<5) return 0

// trước 0 có 2 số >5
if(a>5 && b>5) return 1

// trước 0 có 1 số <5
if( b<5) return 1

// sau 0 mà >7
if(c>7) return 1

// còn lại
return 0

////////////////////////////////////////////////////////////////
case 1: return 1
////////////////////////////////////////////////////////////////
case 2:

// có 2 số <5
if(a<5 && b<5) return 0

// có 2 số >5
if(a>5 && b>5) return 0

// một lớn một nhỏ
return 1

////////////////////////////////////////////////////////////////
case 3:

// gặp 33
if(b==3 && c==3) return 0

// trước số 3 có 2 số <5
if(a<5 && b<5) return 1

// còn lại
return 0

////////////////////////////////////////////////////////////////
case 4:

// trước số 4 có 2 số <5
if(a < 5 && b < 5) return 1

// còn lại
return 0

////////////////////////////////////////////////////////////////
case 5: return 1

////////////////////////////////////////////////////////////////

case 6:

// hai số đều >5
if(a > 5 && b > 5) return 1

// hai số đều <5
if(a < 5 && b < 5) return 1

// một lớn một nhỏ
return 0

////////////////////////////////////////////////////////////////
case 7:

// 3 số liên tiếp đều >7
if(a > 7 && b > 7) return 1

// trước 7 có 2 số <5
if(a < 5 && b < 5) return 0

// còn lại
return 0

////////////////////////////////////////////////////////////////
case 8:

// trước đó là 000
if(a==0 && b==0) return 1

// hai số giống nhau
if(a==b){
    if(a<5) return 1
    if(a>5) return 0
}

// một số lớn một số nhỏ
if((a>5 && b<5) || (a<5 && b>5)) return 0

// còn lại
return 0

////////////////////////////////////////////////////////////////
case 9:

// có ít nhất một số <5
if(a < 5 || b < 5) return 1

// còn lại
return 0

////////////////////////////////////////////////////////////////

}

return 0
}

</script>

</body>
</html>
